<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>SimIA — Instructor</title>
  <link rel="stylesheet" href="/assets/styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <div class="logo">SI</div>
      <div>
        <div class="brand-title">SimIA</div>
        <div class="brand-sub" id="subline">Instructor Console</div>
      </div>
    </div>
    <div class="session">
      <span class="pill mono" id="who">INSTRUCTOR</span>
      <a class="btn ghost" href="/scenario_timeline.html">Timeline</a>
      <a class="btn ghost" href="/outputs_admin.html">Outputs</a>
      <a class="btn ghost" href="/admin.html">Admin</a>
    </div>
  </header>

  <main class="layout layout-wide">
    <section class="content">
      <div class="grid">

        <div class="card span12">
          <div class="card-title">Instructor Overview</div>
          <div class="card-body">
            <div class="row" style="gap:12px;flex-wrap:wrap;align-items:center">
              <span class="pill mono" id="phaseBadge">PHASE-—</span>
              <span class="pill mono" id="eventCount">—</span>
              <span class="pill mono" id="ackSummary">ACK —</span>
            </div>
            <div class="sep"></div>
            <div class="small">Vista dedicata al ruolo INSTRUCTOR: scenario live, timeline e monitoraggio rapido.</div>
          </div>
        </div>

        <div class="card span12">
          <div class="card-title">Live Scenario Log</div>
          <div class="card-body">
            <div class="row" style="justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap">
              <div class="small">Ultimi eventi live</div>
              <button class="btn ghost" id="reloadEvents">Refresh</button>
            </div>
            <div class="sep"></div>
            <div id="eventsBox" class="stack"></div>
          </div>
        </div>

        <div class="card span12">
          <div class="card-title">Quick Links</div>
          <div class="card-body">
            <div class="row" style="gap:8px;flex-wrap:wrap">
              <a class="btn" href="/scenario_timeline.html">Simulation Timeline</a>
              <a class="btn" href="/outputs_admin.html">Outputs Monitor</a>
              <a class="btn ghost" href="/phase_test.html">Phase Control</a>
            </div>
          </div>
        </div>

      </div>
    </section>
  </main>

  <script src="/assets/theme.js"></script>
  <script>
  function esc(s){
    return String(s||"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;")
      .replaceAll('"',"&quot;").replaceAll("'","&#39;");
  }
  async function jget(url){
    const r = await fetch(url, { headers:{ "Accept":"application/json" }});
    const t = await r.text();
    let j; try{ j=JSON.parse(t);}catch{ j={raw:t}; }
    if(!r.ok) throw new Error(j?.error || ("HTTP "+r.status));
    return j;
  }
  const u = new URL(location.href);
  const PID = (u.searchParams.get("pid") || "").trim();
  const ROLE = (u.searchParams.get("role") || "INSTRUCTOR").toUpperCase();
  const TEAM = (u.searchParams.get("team") || "ALL").toUpperCase();

  document.getElementById("who").textContent = `${ROLE} / TEAM:${TEAM}${PID ? " / "+PID : ""}`;

  async function loadState(){
    const j = await jget("/api/scenario/state");
    document.getElementById("phaseBadge").textContent = j.current_phase || "PHASE-1";
  }

  async function loadEvents(){
    const box = document.getElementById("eventsBox");
    box.innerHTML = `<div class="item"><div class="h">Loading…</div></div>`;
    try{
      const j = await jget("/api/scenario/events");
      const arr = Array.isArray(j.events) ? j.events : [];
      document.getElementById("eventCount").textContent = `${arr.length} events`;

      if(!arr.length){
        box.innerHTML = `<div class="item"><div class="h">Nessun evento</div></div>`;
        return;
      }

      box.innerHTML = "";
      for(const ev of arr.slice(0, 20)){
        const div = document.createElement("div");
        div.className = "item";
        div.innerHTML = `
          <div class="h">${esc(ev.title || "(no title)")}</div>
          <div class="small" style="margin-top:6px">
            <span class="pill mono">${esc(ev.kind || "")}</span>
            <span class="pill mono">${esc(ev.severity || "")}</span>
            <span class="pill mono">${esc(ev.audience || "")}</span>
            ${ev.phase ? `<span class="pill mono">${esc(ev.phase)}</span>` : ``}
            <span class="pill mono">${esc(ev.ts || "")}</span>
          </div>
          <div style="margin-top:10px;white-space:pre-wrap">${esc(ev.body || "")}</div>
        `;
        box.appendChild(div);
      }
    }catch(e){
      box.innerHTML = `<div class="item"><div class="h">Errore</div><div class="small mono">${esc(String(e))}</div></div>`;
    }
  }

  async function loadAckSummary(){
    try{
      const j = await jget("/api/scenario/ack_status?limit=10");
      const items = Array.isArray(j.items) ? j.items : [];
      const pct = items.length ? Math.round(items.reduce((a,x)=>a+(x.pct||0),0)/items.length) : 0;
      document.getElementById("ackSummary").textContent = `ACK AVG ${pct}%`;
    }catch(e){
      document.getElementById("ackSummary").textContent = "ACK ERR";
    }
  }

  document.getElementById("reloadEvents").addEventListener("click", async ()=>{
    await loadState(); await loadEvents(); await loadAckSummary();
  });

  (async ()=>{
    await loadState(); await loadEvents(); await loadAckSummary();
  })();
  </script>
  <script src="/assets/branding.js"></script>
</body>
</html>
