<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>SimIA — Accesso</title>
  <link rel="stylesheet" href="/assets/styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <div class="logo">SI</div>
      <div>
        <div class="brand-title">SimIA</div>
        <div class="brand-sub">Role Access Gateway</div>
      </div>
    </div>
  </header>

  <main class="layout layout-wide">
    <section class="content">
      <div class="grid">
        <div class="card span12">
          <div class="card-title">Accesso alla piattaforma</div>
          <div class="card-body">
            <div class="notice">
              <div class="h" id="statusTitle">Verifica accesso…</div>
              <div class="small" id="statusText">Sto verificando il ruolo associato al partecipante.</div>
            </div>
            <div class="sep"></div>
            <pre class="pre" id="debugBox">—</pre>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="/assets/theme.js"></script>
  <script>
  async function jget(url){
    const r = await fetch(url, { headers:{ "Accept":"application/json" }});
    const t = await r.text();
    let j; try{ j=JSON.parse(t);}catch{ j={raw:t}; }
    if(!r.ok) throw new Error(j?.error || ("HTTP "+r.status));
    return j;
  }

  function setStatus(title, text, debug){
    document.getElementById("statusTitle").textContent = title;
    document.getElementById("statusText").textContent = text;
    document.getElementById("debugBox").textContent = debug || "—";
  }

  const u = new URL(location.href);
  const pid = (u.searchParams.get("pid") || "").trim();

  (async ()=>{
    try{
      if(!pid){
        setStatus("Link non valido", "Manca il parametro pid nel link.", "Expected: /access.html?pid=<participant_id>");
        return;
      }

      const j = await jget(`/api/participants?id=${encodeURIComponent(pid)}`);
      const p = j?.participant;
      if(!p){
        setStatus("Partecipante non trovato", "Il pid indicato non corrisponde a nessun partecipante registrato.", pid);
        return;
      }

      const role = String(p.role || "PLAYER").toUpperCase();
      const team = String(p.team_id || "ALL").toUpperCase();

      setStatus("Ruolo identificato", `${p.name} → ${role} / TEAM:${team}`, JSON.stringify(p, null, 2));

      const destMap = {
        ADMIN: "/admin.html",
        INSTRUCTOR: "/instructor.html",
        PLAYER: "/player.html",
        OBSERVER: "/observer.html"
      };

      const dest = new URL(destMap[role] || "/player.html", location.origin);
      dest.searchParams.set("pid", p.id);
      dest.searchParams.set("role", role);
      dest.searchParams.set("team", team);

      setTimeout(()=> location.href = dest.toString(), 400);
    }catch(e){
      setStatus("Errore accesso", String(e), String(e));
    }
  })();
  </script>
</body>
</html>
