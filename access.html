<!doctype html><html lang="it"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>SimIA — Verifica accesso</title><link rel="stylesheet" href="/assets/styles.css"/></head><body><header class="topbar"><div class="brand"><div class="logo" id="brandLogo">SI</div><div><div class="brand-title" id="brandTitle">SimIA</div><div class="brand-sub" id="brandSub">Verifica utente</div></div></div></header><main class="layout layout-wide"><section class="content"><div class="grid"><div class="card span12"><div class="card-title">Accesso alla piattaforma</div><div class="card-body"><div class="notice"><div class="h" id="statusTitle">Verifica credenziali</div><div class="small" id="statusText">Inserisci il codice di accesso associato al partecipante.</div></div><div class="sep"></div><label class="lbl">Participant ID</label><input class="input mono" id="pidBox"/><label class="lbl" style="margin-top:10px">Access code</label><input class="input mono" id="codeBox" placeholder="6 cifre o codice assegnato"/><div class="row" style="margin-top:12px;gap:8px;flex-wrap:wrap"><button class="btn primary" id="verifyBtn">Verifica e accedi</button></div><div class="sep"></div><pre class="pre" id="debugBox">—</pre></div></div></div></section></main><script src="/assets/theme.js"></script><script>
async function jget(url){const r=await fetch(url,{headers:{"Accept":"application/json"}});const t=await r.text();let j;try{j=JSON.parse(t)}catch{j={raw:t}}if(!r.ok)throw new Error(j?.error||("HTTP "+r.status));return j;}
async function jpost(url,body){const r=await fetch(url,{method:"POST",headers:{"Content-Type":"application/json","Accept":"application/json"},body:JSON.stringify(body)});const t=await r.text();let j;try{j=JSON.parse(t)}catch{j={raw:t}}if(!r.ok)throw new Error(j?.error||("HTTP "+r.status));return j;}
function setStatus(title,text,debug){document.getElementById("statusTitle").textContent=title;document.getElementById("statusText").textContent=text;document.getElementById("debugBox").textContent=debug||"—";}
async function loadBrand(){try{const j=await jget("/api/config");const cfg=j.config||{};document.getElementById("brandTitle").textContent=cfg.brandName||"SimIA";document.getElementById("brandSub").textContent=cfg.exerciseSubtitle||"Verifica utente";const logoData=cfg.logoData||"";const logoUrl=cfg.logoUrl||"";const mode=cfg.logoMode||"url";if(mode==="upload"&&logoData){document.getElementById("brandLogo").innerHTML=`<img src="${logoData}" alt="logo" style="width:40px;height:40px;object-fit:contain;border-radius:8px"/>`;}else if(mode==="url"&&logoUrl){document.getElementById("brandLogo").innerHTML=`<img src="${logoUrl}" alt="logo" style="width:40px;height:40px;object-fit:contain;border-radius:8px"/>`;}}catch(e){}}
const u=new URL(location.href);const pid=(u.searchParams.get("pid")||"").trim();if(pid)document.getElementById("pidBox").value=pid;
document.getElementById("verifyBtn").addEventListener("click",async()=>{try{const pid=(document.getElementById("pidBox").value||"").trim();const access_code=(document.getElementById("codeBox").value||"").trim();if(!pid||!access_code){setStatus("Dati mancanti","Inserisci Participant ID e Access code.","Missing pid or access_code");return;}setStatus("Verifica in corso…","Controllo credenziali e ruolo.","POST /api/verify_access");const j=await jpost("/api/verify_access",{pid,access_code});const p=j.participant;const role=String(p.role||"PLAYER").toUpperCase();const team=String(p.team_id||"ALL").toUpperCase();setStatus("Accesso autorizzato",`${p.name} → ${role} / TEAM:${team}`,JSON.stringify(j,null,2));const dest=new URL(j.destination_page||"/player.html",location.origin);dest.searchParams.set("pid",p.id);dest.searchParams.set("role",role);dest.searchParams.set("team",team);setTimeout(()=>location.href=dest.toString(),500);}catch(e){setStatus("Accesso negato",String(e),String(e));}});
loadBrand();
</script>
<script src="/assets/branding.js"></script>
</body></html>
