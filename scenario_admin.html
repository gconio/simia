<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>SimIA — Scenario Engine</title>
<link rel="stylesheet" href="/assets/styles.css"/>
</head>
<body>
<header class="topbar">
  <div class="brand">
    <div class="logo">SI</div>
    <div>
      <div class="brand-title">SimIA</div>
      <div class="brand-sub">Scenario Engine Foundation</div>
    </div>
  </div>
  <div class="session">
    <a class="btn ghost" href="/admin.html">Admin</a>
    <a class="btn ghost" href="/scenario_timeline.html">Timeline</a>
    <a class="btn ghost" href="/outputs_admin.html">Outputs</a>
  </div>
</header>

<main class="layout layout-wide">
<section class="content">
<div class="grid">

<div class="card span12">
  <div class="card-title">Scenario Overview</div>
  <div class="card-body">
    <div class="row" style="gap:10px;flex-wrap:wrap;align-items:flex-end">
      <div style="min-width:220px;flex:2"><label class="lbl">Name</label><input class="input" id="sName" placeholder="Nome scenario"/></div>
      <div style="min-width:220px;flex:2"><label class="lbl">Subtitle</label><input class="input" id="sSubtitle" placeholder="Sottotitolo"/></div>
      <div style="min-width:180px;flex:1"><label class="lbl">Status</label><select class="input" id="sStatus"><option>draft</option><option>ready</option><option>live</option><option>paused</option><option>completed</option></select></div>
      <div style="min-width:180px;flex:1"><label class="lbl">Start at</label><input class="input mono" id="sStartAt" placeholder="2026-03-06T10:00:00Z"/></div>
    </div>
    <div class="row" style="margin-top:10px;gap:10px;flex-wrap:wrap;align-items:flex-end">
      <div style="min-width:260px;flex:3"><label class="lbl">Description</label><input class="input" id="sDescription" placeholder="Descrizione scenario"/></div>
      <div style="min-width:180px;flex:1"><label class="lbl">Current phase</label><input class="input mono" id="sCurrentPhase" placeholder="PHASE-1"/></div>
      <div class="row" style="gap:8px;flex-wrap:wrap">
        <button class="btn primary" id="saveScenarioBtn">Save scenario</button>
        <button class="btn ghost" id="makeCurrentBtn">Set current</button>
        <button class="btn ghost" id="reloadScenarioBtn">Reload</button>
      </div>
    </div>
    <div class="sep"></div>
    <div id="scenarioList" class="stack"></div>
  </div>
</div>

<div class="card span12">
  <div class="card-title">Phases</div>
  <div class="card-body">
    <div class="row" style="gap:10px;flex-wrap:wrap;align-items:flex-end">
      <div style="min-width:160px;flex:1"><label class="lbl">Phase code</label><input class="input mono" id="pCode" placeholder="PHASE-1"/></div>
      <div style="min-width:220px;flex:2"><label class="lbl">Title</label><input class="input" id="pTitle" placeholder="Initial Signal"/></div>
      <div style="min-width:220px;flex:2"><label class="lbl">Description</label><input class="input" id="pDescription" placeholder="Descrizione fase"/></div>
      <div style="min-width:120px;flex:1"><label class="lbl">Order</label><input class="input mono" id="pOrder" value="1"/></div>
      <div style="min-width:120px;flex:1"><label class="lbl">Duration min</label><input class="input mono" id="pDuration" placeholder="60"/></div>
      <div style="min-width:140px;flex:1"><label class="lbl">Status</label><select class="input" id="pStatus"><option>pending</option><option>active</option><option>closed</option></select></div>
      <div class="row" style="gap:8px;flex-wrap:wrap">
        <button class="btn primary" id="savePhaseBtn">Save phase</button>
        <button class="btn ghost" id="reloadPhasesBtn">Reload</button>
      </div>
    </div>
    <div class="sep"></div>
    <div id="phasesList" class="stack"></div>
  </div>
</div>

<div class="card span12">
  <div class="card-title">Inject Library</div>
  <div class="card-body">
    <div class="row" style="gap:10px;flex-wrap:wrap;align-items:flex-end">
      <div style="min-width:180px;flex:2"><label class="lbl">Title</label><input class="input" id="iTitle" placeholder="Titolo inject"/></div>
      <div style="min-width:140px;flex:1"><label class="lbl">Phase</label><input class="input mono" id="iPhase" placeholder="PHASE-1"/></div>
      <div style="min-width:140px;flex:1"><label class="lbl">Kind</label><select class="input" id="iKind"><option>INJECT</option><option>BROADCAST</option><option>UPDATE</option><option>ALERT</option><option>TASK</option></select></div>
      <div style="min-width:140px;flex:1"><label class="lbl">Source</label><select class="input" id="iSource"><option>OSINT</option><option>MEDIA</option><option>HUMINT</option><option>SIGINT</option><option>GEOINT</option><option>GOV</option><option>SOCIAL</option><option>INTERNAL</option></select></div>
      <div style="min-width:120px;flex:1"><label class="lbl">Severity</label><select class="input" id="iSeverity"><option>INFO</option><option>AMBER</option><option>RED</option></select></div>
    </div>
    <div class="row" style="margin-top:10px;gap:10px;flex-wrap:wrap;align-items:flex-end">
      <div style="min-width:140px;flex:1"><label class="lbl">Audience type</label><select class="input" id="iAudienceType"><option>ALL</option><option>TEAM</option><option>ROLE</option><option>USER</option></select></div>
      <div style="min-width:180px;flex:1"><label class="lbl">Audience value</label><input class="input mono" id="iAudienceValue" value="ALL"/></div>
      <div style="min-width:180px;flex:1"><label class="lbl">Scheduled at</label><input class="input mono" id="iScheduledAt" placeholder="2026-03-06T10:30:00Z"/></div>
      <div style="min-width:140px;flex:1"><label class="lbl">Status</label><select class="input" id="iStatus"><option>draft</option><option>scheduled</option><option>queued</option><option>released</option><option>cancelled</option></select></div>
      <div style="min-width:160px;flex:1"><label class="lbl">Author</label><input class="input" id="iAuthor" value="admin"/></div>
    </div>
    <div style="margin-top:10px">
      <label class="lbl">Body</label>
      <textarea class="input" id="iBody" style="min-height:110px"></textarea>
    </div>
    <div class="row" style="margin-top:10px;gap:8px;flex-wrap:wrap">
      <button class="btn primary" id="saveInjectBtn">Save inject</button>
      <button class="btn ghost" id="reloadInjectsBtn">Reload</button>
    </div>
    <div class="sep"></div>
    <div id="injectsList" class="stack"></div>
  </div>
</div>

<div class="card span12">
  <div class="card-title">White Cell Log</div>
  <div class="card-body">
    <div class="row" style="gap:8px;flex-wrap:wrap">
      <button class="btn ghost" id="reloadActionsBtn">Reload log</button>
    </div>
    <div class="sep"></div>
    <div id="actionsList" class="stack"></div>
  </div>
</div>

</div>
</section>
</main>

<script src="/assets/theme.js"></script>
<script src="/assets/branding.js"></script>
<script>
function esc(s){
  return String(s||"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;")
    .replaceAll('"',"&quot;").replaceAll("'","&#39;");
}
async function jget(url){
  const r = await fetch(url, { headers:{ "Accept":"application/json" }});
  const t = await r.text();
  let j; try{ j = JSON.parse(t);}catch{ j={raw:t}; }
  if(!r.ok) throw new Error(j?.error || ("HTTP "+r.status));
  return j;
}
async function jpost(url, body){
  const r = await fetch(url, { method:"POST", headers:{ "Content-Type":"application/json", "Accept":"application/json" }, body: JSON.stringify(body) });
  const t = await r.text();
  let j; try{ j = JSON.parse(t);}catch{ j={raw:t}; }
  if(!r.ok) throw new Error(j?.error || ("HTTP "+r.status));
  return j;
}
async function jdel(url){
  const r = await fetch(url, { method:"DELETE" });
  const t = await r.text();
  let j; try{ j = JSON.parse(t);}catch{ j={raw:t}; }
  if(!r.ok) throw new Error(j?.error || ("HTTP "+r.status));
  return j;
}

let CURRENT = null;

function setScenarioForm(s){
  CURRENT = s || null;
  document.getElementById("sName").value = s?.name || "";
  document.getElementById("sSubtitle").value = s?.subtitle || "";
  document.getElementById("sDescription").value = s?.description || "";
  document.getElementById("sStatus").value = s?.status || "draft";
  document.getElementById("sCurrentPhase").value = s?.current_phase || "";
  document.getElementById("sStartAt").value = s?.start_at || "";
}
async function loadScenario(){
  const j = await jget("/api/scenario/manage");
  const current = j.current || null;
  setScenarioForm(current);
  const box = document.getElementById("scenarioList");
  box.innerHTML = "";
  (j.scenarios || []).forEach(s=>{
    const div = document.createElement("div");
    div.className = "item";
    div.innerHTML = `<div class="row" style="justify-content:space-between;gap:10px;flex-wrap:wrap"><div><div class="h">${esc(s.name)}</div><div class="small">${esc(s.subtitle || "")}</div><div class="small" style="margin-top:6px"><span class="pill mono">${esc(s.status || "")}</span>${s.current_phase ? `<span class="pill mono">${esc(s.current_phase)}</span>` : ""}${j.currentScenarioId===s.id?`<span class="pill mono">CURRENT</span>`:""}</div></div><div class="row" style="gap:8px;flex-wrap:wrap"><button class="btn" data-edit>Edit</button><button class="btn ghost" data-current>Set current</button><button class="btn danger" data-del>Delete</button></div></div>`;
    div.querySelector("[data-edit]").addEventListener("click", ()=>setScenarioForm(s));
    div.querySelector("[data-current]").addEventListener("click", async ()=>{ await jpost("/api/scenario/manage", { action:"set_current", id:s.id }); await refreshAll(); });
    div.querySelector("[data-del]").addEventListener("click", async ()=>{ if(!confirm("Eliminare questo scenario?")) return; await jdel(`/api/scenario/manage?id=${encodeURIComponent(s.id)}`); await refreshAll(); });
    box.appendChild(div);
  });
}
async function loadPhases(){
  const j = await jget("/api/scenario/phases");
  const box = document.getElementById("phasesList");
  box.innerHTML = "";
  (j.phases || []).forEach(p=>{
    const div = document.createElement("div");
    div.className = "item";
    div.innerHTML = `<div class="row" style="justify-content:space-between;gap:10px;flex-wrap:wrap"><div><div class="h">${esc(p.title)} <span class="small mono">(${esc(p.phase_code)})</span></div><div class="small">${esc(p.description || "")}</div><div class="small" style="margin-top:6px"><span class="pill mono">ORDER ${esc(p.sort_order)}</span><span class="pill mono">${esc(p.status || "")}</span>${p.duration_min ? `<span class="pill mono">${esc(p.duration_min)} min</span>` : ""}</div></div><div class="row" style="gap:8px;flex-wrap:wrap"><button class="btn" data-edit>Edit</button><button class="btn danger" data-del>Delete</button></div></div>`;
    div.querySelector("[data-edit]").addEventListener("click", ()=>{
      document.getElementById("pCode").value = p.phase_code || "";
      document.getElementById("pTitle").value = p.title || "";
      document.getElementById("pDescription").value = p.description || "";
      document.getElementById("pOrder").value = p.sort_order || 0;
      document.getElementById("pDuration").value = p.duration_min || "";
      document.getElementById("pStatus").value = p.status || "pending";
      document.getElementById("savePhaseBtn").dataset.editId = p.id;
    });
    div.querySelector("[data-del]").addEventListener("click", async ()=>{ if(!confirm("Eliminare questa fase?")) return; await jdel(`/api/scenario/phases?id=${encodeURIComponent(p.id)}`); await loadPhases(); });
    box.appendChild(div);
  });
}
async function loadInjects(){
  const j = await jget("/api/scenario/injects");
  const box = document.getElementById("injectsList");
  box.innerHTML = "";
  (j.injects || []).forEach(i=>{
    const div = document.createElement("div");
    div.className = "item";
    div.innerHTML = `<div class="row" style="justify-content:space-between;gap:10px;flex-wrap:wrap"><div style="flex:1"><div class="h">${esc(i.title)}</div><div class="small" style="margin-top:6px"><span class="pill mono">${esc(i.kind)}</span><span class="pill mono">${esc(i.source_type)}</span><span class="pill mono">${esc(i.severity)}</span><span class="pill mono">${esc(i.audience_type)}:${esc(i.audience_value)}</span>${i.phase_code?`<span class="pill mono">${esc(i.phase_code)}</span>`:""}<span class="pill mono">${esc(i.status)}</span></div><div style="margin-top:10px;white-space:pre-wrap">${esc(i.body)}</div></div><div class="row" style="gap:8px;flex-wrap:wrap"><button class="btn" data-edit>Edit</button><button class="btn danger" data-del>Delete</button></div></div>`;
    div.querySelector("[data-edit]").addEventListener("click", ()=>{
      document.getElementById("iTitle").value = i.title || "";
      document.getElementById("iPhase").value = i.phase_code || "";
      document.getElementById("iKind").value = i.kind || "INJECT";
      document.getElementById("iSource").value = i.source_type || "OSINT";
      document.getElementById("iSeverity").value = i.severity || "INFO";
      document.getElementById("iAudienceType").value = i.audience_type || "ALL";
      document.getElementById("iAudienceValue").value = i.audience_value || "ALL";
      document.getElementById("iScheduledAt").value = i.scheduled_at || "";
      document.getElementById("iStatus").value = i.status || "draft";
      document.getElementById("iAuthor").value = i.author || "admin";
      document.getElementById("iBody").value = i.body || "";
      document.getElementById("saveInjectBtn").dataset.editId = i.id;
    });
    div.querySelector("[data-del]").addEventListener("click", async ()=>{ if(!confirm("Eliminare questo inject?")) return; await jdel(`/api/scenario/injects?id=${encodeURIComponent(i.id)}`); await loadInjects(); });
    box.appendChild(div);
  });
}
async function loadActions(){
  const j = await jget("/api/scenario/actions?limit=50");
  const box = document.getElementById("actionsList");
  box.innerHTML = "";
  (j.actions || []).forEach(a=>{
    const div = document.createElement("div");
    div.className = "item";
    div.innerHTML = `<div class="row" style="justify-content:space-between;gap:10px;flex-wrap:wrap"><div><div class="h">${esc(a.action_type)}</div><div class="small">${esc(a.notes || "")}</div></div><div class="small mono">${esc(a.actor || "admin")} • ${esc(a.ts || "")}</div></div>`;
    box.appendChild(div);
  });
}
async function refreshAll(){ await loadScenario(); await loadPhases(); await loadInjects(); await loadActions(); }

document.getElementById("saveScenarioBtn").addEventListener("click", async ()=>{
  await jpost("/api/scenario/manage", {
    id: CURRENT?.id,
    name: document.getElementById("sName").value,
    subtitle: document.getElementById("sSubtitle").value,
    description: document.getElementById("sDescription").value,
    status: document.getElementById("sStatus").value,
    current_phase: document.getElementById("sCurrentPhase").value,
    start_at: document.getElementById("sStartAt").value,
    make_current: 1,
    actor: "admin"
  });
  await refreshAll();
  alert("Scenario salvato.");
});
document.getElementById("makeCurrentBtn").addEventListener("click", async ()=>{
  if(!CURRENT?.id){ alert("Seleziona prima uno scenario."); return; }
  await jpost("/api/scenario/manage", { action:"set_current", id: CURRENT.id });
  await refreshAll();
});
document.getElementById("reloadScenarioBtn").addEventListener("click", refreshAll);

document.getElementById("savePhaseBtn").addEventListener("click", async (e)=>{
  await jpost("/api/scenario/phases", {
    id: e.currentTarget.dataset.editId || undefined,
    phase_code: document.getElementById("pCode").value,
    title: document.getElementById("pTitle").value,
    description: document.getElementById("pDescription").value,
    sort_order: document.getElementById("pOrder").value,
    duration_min: document.getElementById("pDuration").value,
    status: document.getElementById("pStatus").value
  });
  e.currentTarget.dataset.editId = "";
  document.getElementById("pCode").value = "";
  document.getElementById("pTitle").value = "";
  document.getElementById("pDescription").value = "";
  document.getElementById("pOrder").value = "1";
  document.getElementById("pDuration").value = "";
  document.getElementById("pStatus").value = "pending";
  await loadPhases();
  await loadScenario();
  await loadActions();
  alert("Fase salvata.");
});
document.getElementById("reloadPhasesBtn").addEventListener("click", loadPhases);

document.getElementById("saveInjectBtn").addEventListener("click", async (e)=>{
  await jpost("/api/scenario/injects", {
    id: e.currentTarget.dataset.editId || undefined,
    title: document.getElementById("iTitle").value,
    phase_code: document.getElementById("iPhase").value,
    kind: document.getElementById("iKind").value,
    source_type: document.getElementById("iSource").value,
    severity: document.getElementById("iSeverity").value,
    audience_type: document.getElementById("iAudienceType").value,
    audience_value: document.getElementById("iAudienceValue").value,
    scheduled_at: document.getElementById("iScheduledAt").value,
    status: document.getElementById("iStatus").value,
    author: document.getElementById("iAuthor").value,
    body: document.getElementById("iBody").value
  });
  e.currentTarget.dataset.editId = "";
  document.getElementById("iTitle").value = "";
  document.getElementById("iPhase").value = "";
  document.getElementById("iBody").value = "";
  document.getElementById("iAudienceValue").value = "ALL";
  document.getElementById("iScheduledAt").value = "";
  document.getElementById("iStatus").value = "draft";
  await loadInjects();
  await loadActions();
  alert("Inject salvato.");
});
document.getElementById("reloadInjectsBtn").addEventListener("click", loadInjects);
document.getElementById("reloadActionsBtn").addEventListener("click", loadActions);

refreshAll();
</script>
</body>
</html>
