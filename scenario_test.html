<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>SimIA — Scenario Test</title>
  <link rel="stylesheet" href="/assets/styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <div class="logo">S</div>
      <div>
        <div class="brand-title">SimIA</div>
        <div class="brand-sub">Scenario Test (POST /api/scenario/events)</div>
      </div>
    </div>
    <div class="session">
      <a class="btn ghost" href="/admin.html">Admin</a>
    </div>
  </header>

  <main class="layout layout-wide">
    <section class="content">
      <div class="grid">
        <div class="card span12">
          <div class="card-title">Invia evento</div>
          <div class="card-body">
            <div class="row" style="gap:10px;flex-wrap:wrap">
              <div style="min-width:180px;flex:1">
                <label class="lbl">Kind</label>
                <select class="input" id="kind">
                  <option>BROADCAST</option>
                  <option>INJECT</option>
                </select>
              </div>
              <div style="min-width:180px;flex:1">
                <label class="lbl">Severity</label>
                <select class="input" id="severity">
                  <option>INFO</option>
                  <option>AMBER</option>
                  <option>RED</option>
                </select>
              </div>
              <div style="min-width:220px;flex:2">
                <label class="lbl">Audience</label>
                <input class="input" id="audience" value="ALL" />
              </div>
              <div style="min-width:220px;flex:2">
                <label class="lbl">Phase (opzionale)</label>
                <input class="input" id="phase" placeholder="PHASE-1" />
              </div>
            </div>

            <div class="sep"></div>

            <label class="lbl">Title</label>
            <input class="input" id="title" value="Test Scenario Controller" />

            <label class="lbl" style="margin-top:10px">Body</label>
            <textarea class="input" id="body" rows="6">Questo è un test dello Scenario Controller.</textarea>

            <div class="row" style="margin-top:12px;flex-wrap:wrap">
              <button class="btn primary" id="sendBtn">Invia evento</button>
              <button class="btn ghost" id="reloadBtn">Ricarica lista</button>
            </div>

            <div class="sep"></div>

            <div class="small mono">Risposta POST</div>
            <pre class="pre" id="postOut">—</pre>

            <div class="small mono">GET /api/scenario/events</div>
            <pre class="pre" id="getOut">—</pre>
          </div>
        </div>
      </div>
    </section>
  </main>

<script>
async function jget(url){
  const r = await fetch(url);
  const t = await r.text();
  let j; try{ j = JSON.parse(t); } catch { j = { raw: t }; }
  if(!r.ok) throw new Error(j.error || ("HTTP "+r.status));
  return j;
}
async function jpost(url, body){
  const r = await fetch(url, {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify(body)
  });
  const t = await r.text();
  let j; try{ j = JSON.parse(t); } catch { j = { raw: t }; }
  if(!r.ok) throw new Error(j.error || ("HTTP "+r.status));
  return j;
}

async function reload(){
  const out = document.getElementById("getOut");
  try{
    const j = await jget("/api/scenario/events");
    out.textContent = JSON.stringify(j, null, 2);
  }catch(e){
    out.textContent = String(e);
  }
}

document.getElementById("sendBtn").addEventListener("click", async ()=>{
  const postOut = document.getElementById("postOut");
  postOut.textContent = "Invio...";
  try{
    const payload = {
      kind: document.getElementById("kind").value,
      severity: document.getElementById("severity").value,
      audience: document.getElementById("audience").value.trim() || "ALL",
      phase: document.getElementById("phase").value.trim() || null,
      title: document.getElementById("title").value.trim() || "",
      body: document.getElementById("body").value || ""
    };
    const j = await jpost("/api/scenario/events", payload);
    postOut.textContent = JSON.stringify(j, null, 2);
    await reload();
  }catch(e){
    postOut.textContent = String(e);
  }
});

document.getElementById("reloadBtn").addEventListener("click", reload);
reload();
</script>
</body>
</html>
