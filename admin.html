
<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>SimIA — Console amministrativa</title>
<link rel="stylesheet" href="/assets/styles.css"/>
</head>

<body>

<header class="topbar">
  <div class="brand">
    <div class="logo">SI</div>
    <div>
      <div class="brand-title">SimIA</div>
      <div class="brand-sub">Console amministrativa</div>
    </div>
  </div>

  <div class="session">
    <a class="btn ghost" href="/outputs_admin.html">Outputs</a>
    <a class="btn ghost" href="/index.html">Home</a>
  </div>
</header>

<main class="layout layout-wide">
<section class="content">

<div class="tabs">
<a class="tab active" data-tab="setup" href="#">Setup</a>
<a class="tab" data-tab="participants" href="#">Participants</a>
<a class="tab" data-tab="scenario" href="#">Scenario</a>
<a class="tab" data-tab="system" href="#">System</a>
</div>

<div class="grid">

<!-- PLATFORM -->
<div class="panel" data-panel="setup">
<div class="card span12">
<div class="card-title">Platform</div>
<div class="card-body">

<label class="lbl">Platform Name</label>
<input class="input" id="platformName"/>

<label class="lbl">Subtitle</label>
<input class="input" id="platformSubtitle"/>

<button class="btn primary" id="savePlatform">Save</button>

</div>
</div>

<div class="card span12">
<div class="card-title">Branding</div>
<div class="card-body">

<label class="lbl">Logo URL</label>
<input class="input" id="logoUrl"/>

<button class="btn primary" id="saveBranding">Save</button>

</div>
</div>

<div class="card span12">
<div class="card-title">Default Theme</div>
<div class="card-body">

<select class="input" id="defaultTheme">
<option value="intel-dark">Dark Intelligence</option>
<option value="nato-blue">NATO Blue</option>
<option value="light-analyst">Light Analyst</option>
<option value="tactical-green">Tactical Green</option>
</select>

<button class="btn primary" id="saveTheme">Save Theme</button>

</div>
</div>

</div>


<!-- PARTICIPANTS -->
<div class="panel" data-panel="participants" style="display:none">

<div class="card span12">
<div class="card-title">Teams</div>
<div class="card-body">

<input class="input" id="teamName" placeholder="Team name"/>
<button class="btn primary" id="addTeam">Add Team</button>

<div id="teamList"></div>

</div>
</div>

<div class="card span12">
<div class="card-title">Participants</div>
<div class="card-body">

<input class="input" id="pName" placeholder="Name"/>
<input class="input" id="pEmail" placeholder="Email"/>
<input class="input" id="pTeam" placeholder="Team"/>

<button class="btn primary" id="addParticipant">Add</button>

<div id="participantsList"></div>

</div>
</div>

</div>


<!-- SCENARIO -->
<div class="panel" data-panel="scenario" style="display:none">

<div class="card span12">
<div class="card-title">Scenario Defaults</div>
<div class="card-body">

<label class="lbl">Session Name</label>
<input class="input" id="sessionName"/>

<label class="lbl">Initial Phase</label>
<select class="input" id="initialPhase">
<option>PHASE-1</option>
<option>PHASE-2</option>
<option>PHASE-3</option>
<option>PHASE-4</option>
</select>

<button class="btn primary" id="saveScenarioDefaults">Save</button>

</div>
</div>

</div>


<!-- SYSTEM -->
<div class="panel" data-panel="system" style="display:none">

<div class="card span12">
<div class="card-title">System Status</div>
<div class="card-body">

<button class="btn" id="checkHealth">Check API</button>

<pre id="healthResult"></pre>

</div>
</div>

</div>

</div>
</section>
</main>

<script src="/assets/app.js"></script>
<script src="/assets/theme.js"></script>

<script>

document.querySelectorAll(".tab").forEach(tab=>{
tab.onclick = e=>{

document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"))
tab.classList.add("active")

const name = tab.dataset.tab

document.querySelectorAll(".panel").forEach(p=>{
p.style.display = "none"
})

document.querySelector('[data-panel="'+name+'"]').style.display="block"

}
})

document.getElementById("checkHealth").onclick = async ()=>{

const r = await fetch("/api/health")
const j = await r.json()

document.getElementById("healthResult").textContent =
JSON.stringify(j,null,2)

}

</script>

</body>
</html>
