<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>SimIA — Phase Test</title>
  <link rel="stylesheet" href="/assets/styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <div class="logo">S</div>
      <div>
        <div class="brand-title">SimIA</div>
        <div class="brand-sub">Phase Test</div>
      </div>
    </div>
    <div class="session">
      <a class="btn ghost" href="/admin.html">Admin</a>
    </div>
  </header>

  <main class="layout layout-wide">
    <section class="content">
      <div class="grid">
        <div class="card span12">
          <div class="card-title">Simulation Phase</div>
          <div class="card-body">
            <div class="row" style="gap:10px;flex-wrap:wrap;align-items:flex-end">
              <div style="min-width:220px">
                <label class="lbl">Set phase</label>
                <select class="input" id="phase">
                  <option>PHASE-1</option>
                  <option>PHASE-2</option>
                  <option>PHASE-3</option>
                  <option>PHASE-4</option>
                </select>
              </div>
              <button class="btn primary" id="setBtn">Update</button>
              <button class="btn ghost" id="getBtn">Reload</button>
            </div>

            <div class="sep"></div>
            <div class="small mono">Response</div>
            <pre class="pre" id="out">—</pre>
          </div>
        </div>
      </div>
    </section>
  </main>

<script>
async function jget(url){
  const r = await fetch(url);
  const t = await r.text();
  let j; try{ j=JSON.parse(t);}catch{ j={raw:t};}
  if(!r.ok) throw new Error(j.error || ("HTTP "+r.status));
  return j;
}
async function jpost(url, body){
  const r = await fetch(url,{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify(body)
  });
  const t = await r.text();
  let j; try{ j=JSON.parse(t);}catch{ j={raw:t};}
  if(!r.ok) throw new Error(j.error || ("HTTP "+r.status));
  return j;
}

async function reload(){
  const out = document.getElementById("out");
  try{
    const j = await jget("/api/scenario/state");
    out.textContent = JSON.stringify(j, null, 2);
    if(j.current_phase) document.getElementById("phase").value = j.current_phase;
  }catch(e){
    out.textContent = String(e);
  }
}

document.getElementById("setBtn").addEventListener("click", async ()=>{
  const out = document.getElementById("out");
  out.textContent = "Updating...";
  try{
    const phase = document.getElementById("phase").value;
    const j = await jpost("/api/scenario/state", { current_phase: phase });
    out.textContent = JSON.stringify(j, null, 2);
  }catch(e){
    out.textContent = String(e);
  }
});

document.getElementById("getBtn").addEventListener("click", reload);
reload();
</script>
</body>
</html>
