<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <base href="/"/>
  <title>SimIA — Timeline</title>
  <link rel="stylesheet" href="/assets/styles.css"/>
</head>
<body>
<header class="topbar">
  <div class="brand">
    <img src="/assets/logo.png" class="logo-img"/>
    <div>
      <div class="brand-title" id="hdrTitle">SimIA - Analytical Simulation Platform</div>
      <div class="brand-sub" id="hdrSub">Timeline</div>
    </div>
  </div>
  <div class="session">
    <div class="session-line">
      <span class="badge" id="sessionBadge">—</span><span class="teamicon-mini"><img id="teamIcon" alt="team icon" /></span><select class="input" id="teamSelect"><option>ALL</option></select>
      <span class="pill mono" id="phasePill">PHASE: —</span>
</div>
    <div class="small">Timer: <span class="mono" id="timerSmall">—</span></div>
  </div>
</header>

<main class="layout">
  <nav class="sidebar">
    <a class="navitem" href="/">Dashboard<span class="navhint">SA</span></a>
    <a class="navitem" href="/feed">Live Feed<span class="navhint">INT</span></a>
    <a class="navitem active" href="/timeline">Timeline<span class="navhint">TL</span></a>
    <a class="navitem" href="/documents">Documents<span class="navhint">DOC</span></a>
    <a class="navitem" href="/workspace">Workspace<span class="navhint">WS</span></a>
    <a class="navitem" href="/tasking">Tasking<span class="navhint">REQ</span></a>
    <a class="navitem" href="/ai">AI Sources<span class="navhint">AI</span></a>
    <a class="navitem" href="/submit">Submit<span class="navhint">OUT</span></a>
    <a class="navitem" href="/instructor">Instructor<span class="navhint">CTL</span></a>
    <a class="navitem" href="/admin">Admin<span class="navhint">CFG</span></a>
  </nav>

  <section class="content">
    <div id="timelineRoot" class="grid">
      <div class="card span12">
        <div class="card-title">Timeline</div>
        <div class="card-body">
          <div class="row">
            <div style="flex:1">
              <label class="lbl">Vista</label>
              <select class="input" id="tlView">
                <option value="ALL">Tutto (Attivazioni + Tasking)</option>
                <option value="ACT">Solo attivazioni</option>
                <option value="TASK">Solo tasking</option>
                <option value="RELEASED">Solo rilasciati</option>
              </select>
            </div>
            <div style="flex:1">
              <label class="lbl">Ordinamento</label>
              <select class="input" id="tlSort">
                <option value="ASC">T+ crescente</option>
                <option value="DESC">T+ decrescente</option>
              </select>
            </div>
            <div style="flex:2">
              <label class="lbl">Cerca</label>
              <input class="input" id="tlSearch" placeholder="ID, titolo, fonte, testo..."/>
            </div>
          </div>
          <div class="sep"></div>
          <div id="tlList" class="stack"></div>
        </div>
      </div>
    </div>
  </section>
</main>

<script src="/assets/app.js" defer></script>
</body>
</html>
