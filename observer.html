<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>SimIA — Observer</title>
  <link rel="stylesheet" href="/assets/styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <div class="logo">SI</div>
      <div>
        <div class="brand-title">SimIA</div>
        <div class="brand-sub" id="subline">Observer View</div>
      </div>
    </div>
    <div class="session">
      <span class="pill mono" id="who">OBSERVER</span>
      <button class="btn ghost" id="refreshBtn">Refresh</button>
    </div>
  </header>

  <main class="layout layout-wide">
    <section class="content">
      <div class="grid">
        <div class="card span12">
          <div class="card-title">Observer Feed (read-only)</div>
          <div class="card-body">
            <div class="notice">
              <div class="h">Read-only</div>
              <div class="small">Gli observer vedono il feed ma non possono produrre output né registrare ACK.</div>
            </div>
            <div class="sep"></div>
            <div class="row" style="gap:10px;flex-wrap:wrap;align-items:center">
              <span class="pill mono" id="phaseBadge">PHASE-—</span>
              <span class="pill mono" id="count">—</span>
            </div>
            <div class="sep"></div>
            <div id="feed" class="stack"></div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="/assets/theme.js"></script>
  <script>
  function esc(s){
    return String(s||"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;")
      .replaceAll('"',"&quot;").replaceAll("'","&#39;");
  }
  async function jget(url){
    const r = await fetch(url, { headers:{ "Accept":"application/json" }});
    const t = await r.text();
    let j; try{ j=JSON.parse(t);}catch{ j={raw:t}; }
    if(!r.ok) throw new Error(j?.error || ("HTTP "+r.status));
    return j;
  }
  const u = new URL(location.href);
  const PID = (u.searchParams.get("pid") || "").trim();
  const ROLE = (u.searchParams.get("role") || "OBSERVER").toUpperCase();
  const TEAM = (u.searchParams.get("team") || "ALL").toUpperCase();

  document.getElementById("who").textContent = `${ROLE} / TEAM:${TEAM}${PID ? " / "+PID : ""}`;
  document.getElementById("subline").textContent = `Observer — ${TEAM}`;

  function render(events){
    const box = document.getElementById("feed");
    document.getElementById("count").textContent = `${events.length} events`;
    if(!events.length){
      box.innerHTML = `<div class="item"><div class="h">Nessun evento</div></div>`;
      return;
    }
    box.innerHTML = "";
    for(const ev of events){
      const div = document.createElement("div");
      div.className = "item";
      div.innerHTML = `
        <div class="h">${esc(ev.title || "(no title)")}</div>
        <div class="small" style="margin-top:6px">
          <span class="pill mono">${esc(ev.kind || "")}</span>
          <span class="pill mono">${esc(ev.severity || "")}</span>
          <span class="pill mono">${esc(ev.audience || "")}</span>
          ${ev.phase ? `<span class="pill mono">${esc(ev.phase)}</span>` : ``}
          <span class="pill mono">${esc(ev.ts || "")}</span>
        </div>
        <div style="margin-top:10px;white-space:pre-wrap">${esc(ev.body || "")}</div>
      `;
      box.appendChild(div);
    }
  }

  async function refresh(){
    try{
      const j = await jget(`/api/scenario/feed?team=${encodeURIComponent(TEAM)}&role=${encodeURIComponent(ROLE)}`);
      document.getElementById("phaseBadge").textContent = j.current_phase || "PHASE-1";
      render(Array.isArray(j.events) ? j.events : []);
    }catch(e){
      document.getElementById("feed").innerHTML = `<div class="item"><div class="h">Errore</div><div class="small mono">${esc(String(e))}</div></div>`;
    }
  }

  document.getElementById("refreshBtn").addEventListener("click", refresh);
  refresh();
  setInterval(refresh, 10000);
  </script>
  <script src="/assets/branding.js"></script>
</body>
</html>
